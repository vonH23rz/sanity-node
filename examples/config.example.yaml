# =============================================================================
# Sanity Node example configuration
# =============================================================================
#
# 🟧 Required = review or change this for your environment
# 🩵 Optional = enable only if you use this feature
#
# Sanity Node reads this file to understand what it should monitor.
# You should not need to edit the Python code.
#
# Start small:
# 1. configure the dashboard
# 2. configure the collector
# 3. add one host
# 4. confirm the dashboard works
# 5. enable optional features later
#
# =============================================================================


# =============================================================================
# Dashboard identity
# =============================================================================
# 🟧 Required: basic dashboard settings

dashboard:
  title: Sanity Node
  subtitle: Observe. Announce. Stay sane.
  runtime_mode: public      # public or reference
  refresh_minutes: 5        # number of minutes between dashboard refreshes
  port: 8099                # default Sanity Node web port


# =============================================================================
# Collector node
# =============================================================================
# 🟧 Required: the Linux / Utility collector node running Sanity Node
#
# This can be a dedicated Utility Node or an existing always-on Linux machine.

collector:
  id: collector             # internal name, no spaces
  display_name: Utility Node
  hostname: utility-node
  type: linux               # linux


# =============================================================================
# Hosts
# =============================================================================
# 🟧 Required: add at least one host that Sanity Node should monitor.
#
# A host can be:
# - a TrueNAS SCALE system
# - a Linux host
# - the collector node itself
# - another server, lab machine, archive node, or Docker host
#
# Public summary cards are generated per enabled host.
# Card order is:
# 1. collector / Utility Node
# 2. TrueNAS systems
# 3. additional enabled hosts
#
# Disabled hosts are ignored until enabled.
#
# For enabled remote type: truenas or type: linux hosts:
# - modules.system_info: true collects hostname, OS, kernel, uptime, CPU,
#   memory, load, and host-type-aware Apps or Containers activity
# - the host must provide an address and explicit enabled SSH settings
#
# For enabled type: truenas hosts:
# - modules.pools: true activates live pool inventory, capacity,
#   allocation percentage, and conservative ZFS health checks
# - modules.temperatures: true activates pool-level average and maximum
#   disk-temperature checks using zpool device mapping
# - modules.smart: true activates conservative per-device SMART health
#   checks summarized at pool level
# - modules.snapshots: true activates live periodic snapshot-task and
#   latest-snapshot freshness checks
# - modules.replications: true activates live replication-task and
#   execution-state checks
#
# For enabled remote type: linux hosts:
# - modules.docker: true enables remote docker inspect checks
# - modules.local_storage: true enables remote df checks
# - modules.backup_status: true enables remote backup marker checks
# - the host must provide an address and explicit enabled SSH settings
#
# Remote checks require working Sanity Node SSH credentials.

hosts:
  # ---------------------------------------------------------------------------
  # TrueNAS Server 1
  # ---------------------------------------------------------------------------
  # 🟧 Required if you want to monitor a TrueNAS system

  - id: host1
    enabled: true
    display_name: TrueNAS Server 1
    hostname: truenas-server-1   # real hostname or expected hostname
    address: 192.168.1.20       # IP address or DNS name used to connect
    type: truenas                # truenas/linux
    web_url: http://192.168.1.20 # optional browser link to the web UI

    ssh:
      enabled: true              # required for TrueNAS monitoring
      user: truenas_admin
      key_file: /app/ssh/id_ed25519

    modules:
      system_info: true          # collect generic host telemetry
      pools: true                # live pool capacity and health check
      temperatures: true         # live pool disk-temperature summaries
      smart: true                # conservative pool SMART health check
      snapshots: true            # live task and snapshot freshness check
      replications: false        # live task and execution-state check
      apps: true                 # true/false
      services: true             # true/false


  # ---------------------------------------------------------------------------
  # TrueNAS Server 2
  # ---------------------------------------------------------------------------
  # 🩵 Optional: enable this if you have a second TrueNAS system.
  #
  # This does not have to be a backup server. It can also be a test server,
  # archive server, lab server, or any other TrueNAS SCALE system.
  #
  # Because enabled is false, this host is ignored until you enable it.

  - id: host2
    enabled: false
    display_name: TrueNAS Server 2
    hostname: truenas-server-2   # real hostname or expected hostname
    address: 192.168.1.30       # IP address or DNS name used to connect
    type: truenas
    web_url: http://192.168.1.30 # optional browser link to the web UI

    ssh:
      enabled: true              # required for TrueNAS monitoring
      user: truenas_admin
      key_file: /app/ssh/id_ed25519

    modules:
      system_info: true          # collect generic host telemetry
      pools: true                # live pool capacity and health check
      temperatures: true         # live pool disk-temperature summaries
      smart: true                # conservative pool SMART health check
      snapshots: true            # live task and snapshot freshness check
      replications: false        # live task and execution-state check
      apps: false                # true/false
      services: false            # true/false


  # ---------------------------------------------------------------------------
  # Collector as monitored host
  # ---------------------------------------------------------------------------
  # 🩵 Optional but recommended: monitor the collector itself.
  # Collector-local system_info requires no SSH credentials.

  - id: collector
    enabled: true
    display_name: Utility Node
    hostname: utility-node
    address: 192.168.1.10       # IP address or DNS name used to connect
    type: linux

    modules:
      system_info: true          # collect locally without SSH
      local_storage: true        # true/false
      docker: true               # true/false
      backup_status: false       # true/false
      services: true             # true/false


# =============================================================================
# Services
# =============================================================================
# 🩵 Optional: define applications, helpers, and web services.
#
# Example services are disabled by default.
# HTTP checks are often the easiest and safest way to monitor web services.
#
# Services are grouped onto the summary card of their host:
# - host: collector  -> appears on the Utility Node card
# - host: host1      -> appears on the TrueNAS Server 1 card
#
# Service type controls the summary count:
# - type: app        -> counted as an App
# - type: helper     -> counted as a Helper
#
# Check type controls how Sanity Node checks the service:
# - check: http        -> HTTP/HTTPS reachability check
# - check: docker      -> collector-local or remote Linux container status
# - check: truenas_app -> configured TrueNAS SCALE app status
#
# Current public-runtime behavior:
# - http checks are active and can report UP/DOWN
# - collector Docker checks use local docker inspect
# - remote Docker checks require an enabled type: linux host with:
#   - modules.docker: true
#   - a non-empty address
#   - ssh.enabled: true
#   - non-empty ssh.user and ssh.key_file
# - ineligible remote Docker hosts remain NOT CHECKED
# - SSH failures report UNKNOWN; missing containers report MISSING
# - successful SSH parsing ignores stderr login banners
# - truenas_app checks are active for enabled type: truenas hosts with an address
# - truenas_app checks on non-TrueNAS hosts are shown as NOT CHECKED for now
#
# To use one:
# 1. copy or edit the block
# 2. change host/name/url/container/app_id
# 3. set enabled: true

services:
  # ---------------------------------------------------------------------------
  # HTTP service example
  # ---------------------------------------------------------------------------
  # Good for web interfaces, Dockge stacks, Docker Compose apps,
  # TrueNAS-hosted apps, or reverse-proxied services.

  - enabled: false
    host: host1
    name: Jellyfin
    type: app                  # app/helper
    check: http                # http/truenas_app/docker
    url: http://192.168.1.20:8069


  - enabled: false
    host: host1
    name: Wiki.js
    type: app
    check: http
    url: http://192.168.1.20:9190


  # ---------------------------------------------------------------------------
  # TrueNAS App example
  # ---------------------------------------------------------------------------
  # Uses TrueNAS SCALE app status through midclt.

  - enabled: false
    host: host1
    name: OpenWebUI
    type: app
    check: truenas_app
    app_id: open-webui
    url: http://192.168.1.20:31028


  # ---------------------------------------------------------------------------
  # Docker container example
  # ---------------------------------------------------------------------------
  # Collector services use local Docker access.
  # Remote Linux services require modules.docker: true and explicit SSH settings.
  # If you do not want to grant Docker access, use HTTP checks where possible.

  - enabled: false
    host: collector
    name: Pi-hole
    type: app
    check: docker
    container: pihole
    url: http://192.168.1.10:8081/admin/


  - enabled: false
    host: collector
    name: Cloudflare Tunnel
    type: helper
    check: docker
    container: tunnel


# =============================================================================
# Local storage checks
# =============================================================================
# 🩵 Optional: monitor selected local filesystems.
#
# Current public-runtime behavior:
# - collector-local checks use local df
# - remote checks require an enabled type: linux host with:
#   - modules.local_storage: true
#   - a non-empty address
#   - ssh.enabled: true
#   - non-empty ssh.user and ssh.key_file
# - ineligible remote checks remain NOT CHECKED
# - SSH failures report UNKNOWN; missing mounts report MISSING
# - warning_percent defaults to 80 if omitted
# - critical_percent defaults to 90 if omitted
#
# Enable only mountpoints that actually exist on the selected host.

local_storage:
  - enabled: false
    host: collector
    mount: /
    label: System Disk
    warning_percent: 80
    critical_percent: 90

  - enabled: false
    host: collector
    mount: /mnt/storage
    label: Storage Disk
    warning_percent: 80
    critical_percent: 90


# =============================================================================
# Backup status checks
# =============================================================================
# 🩵 Optional: monitor a backup marker file, optional systemd timer, log folder,
# and backup target label.
#
# Current public-runtime behavior:
# - collector-local checks read the marker and timer locally
# - remote checks require an enabled type: linux host with:
#   - modules.backup_status: true
#   - a non-empty address
#   - ssh.enabled: true
#   - non-empty ssh.user and ssh.key_file
# - marker_file age is checked against max_age_hours
# - systemd_timer is optional and checked when configured
# - ineligible remote checks remain NOT CHECKED
# - missing markers report MISSING; SSH/query failures report UNKNOWN
# - max_age_hours defaults to 36 if omitted
#
# Keep enabled: false unless those files and the timer exist on your system.

backup_checks:
  - enabled: false
    host: collector
    name: Utility Node Backup
    marker_file: /var/backups/utility-node/last-successful-backup.txt
    log_dir: /var/backups/utility-node/logs
    systemd_timer: utility-node-backup.timer
    target: backup/utility/utility-node
    max_age_hours: 36


# =============================================================================
# Protection relationships
# =============================================================================
# 🩵 Optional: define backups or replications between systems.
#
# Sanity Node does not assume that Host 1 backs up to Host 2.
# Protection relationships only exist when configured here.
#
# Current public-runtime behavior:
# - enabled relationships are shown in the Configured Protection Relationships Runtime Detail section
# - complete replication relationships begin as CONFIGURED
# - missing source/target host information shows INCOMPLETE
# - a live TrueNAS replication task can overlay the relationship status when:
#   - source_host matches the monitored TrueNAS host
#   - every configured dataset is present in the task source datasets
#   - the task target equals or sits below target_prefix
# - live snapshot tasks can overlay the same relationship only when every
#   configured dataset is confidently covered:
#   - an exact snapshot-task dataset always covers that dataset
#   - an ancestor covers it only when recursive is explicitly true
#   - TrueNAS exclude paths block the excluded dataset and its descendants
#   - missing, malformed, partial, or ambiguous coverage does not propagate
# - when snapshot and replication overlays both match, worst severity wins
# - unmatched relationships keep their configured status
# - overlays contribute to public Overall Status and do not replace the reference checks
#
# Keep enabled: false unless this replication relationship actually exists.

protection:
  - enabled: false
    id: host1-to-host2
    name: TrueNAS Server 1 → TrueNAS Server 2
    type: replication
    source_host: host1
    target_host: host2
    target_prefix: backup/host1/zfs-replication

    datasets:
      - tank/stacks
      - tank/configs
      - tank/media
      - vm


# =============================================================================
# Image update monitoring
# =============================================================================
# 🩵 Optional: report available container or TrueNAS app updates.
#
# Supported providers:
# - diun: reads a Diun Prometheus metrics endpoint
# - truenas: reads native app update fields through midclt app.query
#
# UPDATE means maintenance is available. It does not mean the service is down.
# Healthy configured Docker and TrueNAS app services can be overlaid as UPDATE
# in configuration-driven service status. Existing unhealthy states always win.
# Update overlays are informational and can produce public Overall Status INFO.
# They do not modify the original reference dashboard.

image_updates:
  enabled: false

  sources:
    - id: collector-diun
      host: collector
      provider: diun
      url: http://127.0.0.1:9092/metrics

    - id: host1-truenas-apps
      host: host1
      provider: truenas


# =============================================================================
# Summary cards
# =============================================================================
# 🩵 Optional: public dashboard top cards.
#
# Current public-runtime behavior:
# - controls the order and selection of the primary Dashboard Summary row
# - supported cards: systems, storage, protection, services
# - card order follows the order below
# - duplicate card names are removed; the first occurrence wins
# - unknown card names are ignored
# - if no valid cards are configured, the default four cards are used
# - the Dashboard Summary header shows the active cards that were rendered
#
# Recommended default:
# - systems
# - storage
# - protection
# - services

summary_cards:
  - systems
  - storage
  - protection
  - services
